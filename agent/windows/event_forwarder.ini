# TechvSOC XDR Native Agent - Configuration
# TechvSOC XDR Platform v2.0.0
#
# Windows native agent: Windows Event Log + system metrics + file log forwarding
# Log shipping: raw TCP syslog RFC 5424. Registration + metrics: WinHTTP REST.

[syslog]
# Raw TCP syslog endpoint (RFC 5424, newline-framed)
# Must match SYSLOG_TCP_PORT in backend config (default 5514, no root required)
host = 127.0.0.1
port = 5514

[backend]
# Backend REST API base URL (no trailing slash)
# Must match TECHVSOC_AGENT_BACKEND_URL from the Python agent
url = http://localhost:8000/api/v1

# Bearer token for JWT authentication (required — get from admin panel)
token =

# TLS certificate verification: 1=verify (production), 0=skip (dev/self-signed)
tls_verify = 1

[agent]
# Agent version (updated on rebuild)
version = 2.0.0

# Endpoint ID — auto-populated after first successful registration (0 = auto-register)
# DO NOT edit this manually unless you want to re-register
endpoint_id = 0

# System metrics collection interval (seconds)
metrics_interval = 30

# Log file scan interval (seconds)
log_interval = 60

# Windows event flush interval (seconds) — flush queued events at most this often
event_flush_interval = 10

# Windows event batch size — flush after this many events even if timer hasn't fired
event_flush_batch = 50

[log_files]
# Additional log files to tail and forward to backend.
# count = total number of file entries below.
count = 0
# Uncomment and set paths as needed:
# file_01 = C:\Logs\application.log
# file_02 = C:\inetpub\logs\LogFiles\W3SVC1\u_ex.log

# ---------------------------------------------------------------
# Windows Event Log channel subscriptions
# ---------------------------------------------------------------
[channels]
# ---------------------------------------------------------------
# Core Windows Administrative Channels
# ---------------------------------------------------------------
channel_01 = Security,enabled=1
channel_02 = System,enabled=1
channel_03 = Application,enabled=1

# ---------------------------------------------------------------
# Sysmon (process, network, file, registry, image load monitoring)
# Requires Sysmon to be installed
# ---------------------------------------------------------------
channel_04 = Microsoft-Windows-Sysmon/Operational,enabled=1

# ---------------------------------------------------------------
# PowerShell (script block, module, console logging)
# ---------------------------------------------------------------
channel_05 = Microsoft-Windows-PowerShell/Operational,enabled=1

# ---------------------------------------------------------------
# Windows Defender (malware detection, scans, remediation)
# ---------------------------------------------------------------
channel_06 = Microsoft-Windows-Windows Defender/Operational,enabled=1

# ---------------------------------------------------------------
# Terminal Services / RDP
# ---------------------------------------------------------------
channel_07 = Microsoft-Windows-TerminalServices-LocalSessionManager/Operational,enabled=1
channel_08 = Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational,enabled=1
channel_09 = Microsoft-Windows-RemoteDesktopServices-RdpCoreTS/Operational,enabled=1

# ---------------------------------------------------------------
# Task Scheduler
# ---------------------------------------------------------------
channel_10 = Microsoft-Windows-TaskScheduler/Operational,enabled=1

# ---------------------------------------------------------------
# Windows Firewall
# ---------------------------------------------------------------
channel_11 = Microsoft-Windows-Windows Firewall With Advanced Security/Firewall,enabled=1

# ---------------------------------------------------------------
# BITS (Background Intelligent Transfer Service)
# ---------------------------------------------------------------
channel_12 = Microsoft-Windows-Bits-Client/Operational,enabled=1

# ---------------------------------------------------------------
# WMI Activity
# ---------------------------------------------------------------
channel_13 = Microsoft-Windows-WMI-Activity/Operational,enabled=1

# ---------------------------------------------------------------
# DNS Client
# ---------------------------------------------------------------
channel_14 = Microsoft-Windows-DNS-Client/Operational,enabled=1

# ---------------------------------------------------------------
# Print Service (document audit)
# ---------------------------------------------------------------
channel_15 = Microsoft-Windows-PrintService/Operational,enabled=1

# ---------------------------------------------------------------
# Code Integrity (driver/module signing)
# ---------------------------------------------------------------
channel_16 = Microsoft-Windows-CodeIntegrity/Operational,enabled=1

# ---------------------------------------------------------------
# BitLocker Drive Encryption
# ---------------------------------------------------------------
channel_17 = Microsoft-Windows-BitLocker/BitLocker Management,enabled=1

# ---------------------------------------------------------------
# LSA (Lsass.exe authentication)
# ---------------------------------------------------------------
channel_18 = Microsoft-Windows-LsaSrv/Operational,enabled=1

# ---------------------------------------------------------------
# Security Audit (audit policy changes)
# ---------------------------------------------------------------
channel_19 = Microsoft-Windows-Security-Auditing,enabled=1

# ---------------------------------------------------------------
# SMB Client / Server
# ---------------------------------------------------------------
channel_20 = Microsoft-Windows-SmbClient/Operational,enabled=1
channel_21 = Microsoft-Windows-SmbServer/Operational,enabled=1

# ---------------------------------------------------------------
# DHCP Client
# ---------------------------------------------------------------
channel_22 = Microsoft-Windows-Dhcp-Client/Operational,enabled=1

# ---------------------------------------------------------------
# NTLM (authentication audit)
# ---------------------------------------------------------------
channel_23 = Microsoft-Windows-NTLM/Operational,enabled=1

# ---------------------------------------------------------------
# Kerberos (ticket audit)
# ---------------------------------------------------------------
channel_24 = Microsoft-Windows-Kerberos/Operational,enabled=1

# ---------------------------------------------------------------
# Windows Update
# ---------------------------------------------------------------
channel_25 = Microsoft-Windows-WindowsUpdateClient/Operational,enabled=1

# ---------------------------------------------------------------
# WinRM (remote management)
# ---------------------------------------------------------------
channel_26 = Microsoft-Windows-WinRM/Operational,enabled=1

# ---------------------------------------------------------------
# Remote Access / VPN
# ---------------------------------------------------------------
channel_27 = Microsoft-Windows-RemoteAccess/Operational,enabled=1

# ---------------------------------------------------------------
# Kernel (general system events)
# ---------------------------------------------------------------
channel_28 = Microsoft-Windows-Kernel-General/Operational,enabled=1

# ---------------------------------------------------------------
# File Replication Service
# ---------------------------------------------------------------
channel_29 = Microsoft-Windows-FileReplicationService/Operational,enabled=1

[filters]
# Key Security Event IDs for intrusion detection
# Authentication: 4624,4625,4634,4648,4672
# Process: 4688,4697,4702
# Account Management: 4720,4732,4740,4756,4767
# Kerberos: 4768,4769,4771
# Other Auth: 4776
# DS/Object Access: 5136,5140,5142,5145
# Service: 7034,7036,7045
security_event_ids = 4624,4625,4634,4648,4672,4688,4697,4702,4720,4732,4740,4756,4767,4768,4769,4771,4776,5136,5140,5142,5145,7034,7036,7045

# McAfee provider filter (applied to Application channel)
mcafee_provider = McLogEvent

# Microsoft Antimalware provider filter (applied to System channel)
ms_antimalware_provider = Microsoft Antimalware

# Eventlog provider filter (applied to System channel)
eventlog_provider = Eventlog

[logging]
# Log level: 0=None, 1=Error, 2=Warning, 3=Info, 4=Debug
log_level = 3

# Log file path (empty = same dir as exe)
log_file = event_forwarder.log
